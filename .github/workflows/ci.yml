backend:
  name: Backend - Test & Build
  runs-on: ubuntu-latest

  services:
    mysql:
      image: mysql:8
      env:
        MYSQL_ROOT_PASSWORD: root
        MYSQL_DATABASE: joinme
        MYSQL_USER: appuser
        MYSQL_PASSWORD: senha123
      ports:
        - 3306:3306
      options: >-
        --health-cmd="mysqladmin ping --silent"
        --health-interval=10s
        --health-timeout=5s
        --health-retries=5

  defaults:
    run:
      working-directory: backend

  strategy:
    matrix:
      node-version: [22]

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: pnpm
        cache-dependency-path: backend/pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Wait for MySQL
      run: |
        until mysqladmin ping -h "127.0.0.1" -uappuser -psenha123 --silent; do
          sleep 2
        done

    - name: Setup env
      run: |
        echo "DATABASE_URL=mysql://appuser:senha123@127.0.0.1:3306/joinme" >> .env

    - name: Run migrations (Drizzle)
      run: pnpm db:push

    - name: Type check
      run: pnpm check

    - name: Run tests
      run: pnpm test

    - name: Build
      run: pnpm build
