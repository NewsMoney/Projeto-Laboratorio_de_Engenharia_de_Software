name: CI

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]

jobs:
  frontend:
    name: Frontend - Build & Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            backend/pnpm-lock.yaml

      - name: Install backend dependencies (needed for type resolution)
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: frontend
        run: pnpm check

      - name: Build
        working-directory: frontend
        run: pnpm build

  backend:
    name: Backend - Test & Build
    runs-on: ubuntu-latest
    
    # Variável de ambiente global para o job de backend
    env:
      DATABASE_URL: mysql://appuser:senha123@127.0.0.1:3306/joinme

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: joinme
          MYSQL_USER: appuser
          MYSQL_PASSWORD: senha123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Migrate Database (Drizzle)
        run: pnpm db:push

      - name: Type check
        run: pnpm check

      - name: Run Tests
        run: pnpm test

      - name: Build
        run: pnpm build
